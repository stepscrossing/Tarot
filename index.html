<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystic Tarot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0f0f12', // Deep dark
              surface: '#1a1a20',
              gold: {
                DEFAULT: '#d4af37', // Classic metallic gold
                dim: '#b5942f',     // Slightly darker gold
                light: '#f5e3b5',   // Pale champagne gold
                glow: '#ffeebb'     // Bright glow
              },
              mystic: {
                dark: '#0a0a0a',
                purple: '#1e1b2e'
              }
            },
            fontFamily: {
              serif: ['"PingFang SC"', 'Cormorant Garamond', 'serif'],
              display: ['Cinzel Decorative', 'cursive'],
              sans: ['"PingFang SC"', '"Noto Sans SC"', 'sans-serif'],
            },
            backgroundImage: {
              'radial-gold': 'radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(15,15,18,0) 70%)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f0f12;
        color: #d4af37;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif; /* Force global default font */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0f12; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d4af37; 
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
